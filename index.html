<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Başak & Ceyhun | Anılarınızı Paylaşın</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-flower top-left"></div>
<div class="background-flower bottom-right"></div>

<div class="container">

<div class="card">

<h1 class="names">
Başak
<span>&</span>
Ceyhun
</h1>

<p class="date">
13 Eylül 2026
</p>

<div class="divider"></div>

<p class="welcome-text">
Bu özel günümüzde bizimle olduğunuz için teşekkür ederiz.
Çektiğiniz fotoğraf ve videoları aşağıdan yükleyerek
bu güzel anıları birlikte ölümsüzleştirebilirsiniz.
</p>

<div class="upload-box">

<input
type="file"
id="fileInput"
multiple
accept="image/*,video/*">

<label for="fileInput" class="select-button">
Fotoğraf / Video Seç
</label>

<div id="preview"></div>

<button id="uploadButton">
Anılarınızı Paylaşın
</button>

<div class="progress-area">

<div class="progress-bar">
<div id="progress"></div>
</div>

<p id="status"></p>

</div>

</div>

<div class="footer">
Sevgiyle ❤️<br>
Başak & Ceyhun
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
